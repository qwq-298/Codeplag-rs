<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

nalyze a GitHub repository\r\n    Fetch {\r\n        /// GitHub repository URL\r\n        #[arg(short, long)]\r\n        repo: String,\r\n\r\n        /// Output format (text, json)\r\n        #[arg(short, long, default_value = \"text\")]\r\n        output: String,\r\n    },\r\n\r\n    /// Search GitHub for code similar to a local project\r\n    Search {\r\n        /// Path to a source file or project directory\r\n        #[arg(short, long)]\r\n        path: Option\u003cString\u003e,\r\n        \r\n\r\n        /// GitHub repo URL to fetch and search against\r\n        #[arg(short, long)]\r\n        repo: Option\u003cString\u003e,\r\n\r\n        /// Maximum number of search results per term (default: 5)\r\n        #[arg(short, long, default_value = \"5\")]\r\n        limit: usize,\r\n\r\n        /// Output format (text, json)\r\n        #[arg(short, long, default_value = \"text\")]\r\n        output: String,\r\n    },\r\n\r\n    /// Compare two projects (directories) at the project level\r\n    Project {\r\n        /// Path to project A\r\n        #[arg(short = 'a', long)]\r\n        project_a: String,\r\n\r\n        /// Path to project B\r\n        #[arg(short = 'b', long)]\r\n        project_b: String,\r\n\r\n        /// Output format (text, json)\r\n        #[arg(short, long, default_value = \"text\")]\r\n        output: String,\r\n    },\r\n\r\n    /// Batch fetch multiple GitHub repos and compare all pairs\r\n    Batch {\r\n        /// Comma-separated GitHub repo URLs (e.g., \"user/a,user/b\")\r\n        #[arg(short, long, value_delimiter = ',')]\r\n        repos: Vec\u003cString\u003e,\r\n\r\n        /// Output format (text, json)\r\n        #[arg(short, long, default_value = \"text\")]\r\n        output: String,\r\n    },\r\n}\r\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","31830","OneDrive","Desktop","Codeplag-rs","src","core","mod.rs"],"content":"pub mod types;\r\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","31830","OneDrive","Desktop","Codeplag-rs","src","core","types.rs"],"content":"use serde::{Deserialize, Serialize};\r\n\r\n/// Supported programming languages for analysis\r\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Hash, Serialize, Deserialize)]\r\npub enum Language {\r\n    Rust,\r\n    Python,\r\n    JavaScript,\r\n    TypeScript,\r\n    Go,\r\n    C,\r\n    Cpp,\r\n    Java,\r\n    Unknown,\r\n}\r\n\r\nimpl Language {\r\n    /// Detect language from file extension\r\n    pub fn from_extension(ext: \u0026str) -\u003e Self {\r\n        match ext {\r\n            \"rs\" =\u003e Language::Rust,\r\n            \"py\" =\u003e Language::Python,\r\n            \"js\" =\u003e Language::JavaScript,\r\n            \"ts\" =\u003e Language::TypeScript,\r\n            \"go\" =\u003e Language::Go,\r\n            \"c\" =\u003e Language::C,\r\n            \"cpp\" | \"cc\" | \"cxx\" =\u003e Language::Cpp,\r\n            \"java\" =\u003e Language::Java,\r\n            _ =\u003e Language::Unknown,\r\n        }\r\n    }\r\n\r\n    /// Get the tree-sitter language for this language\r\n    pub fn tree_sitter_language(\u0026self) -\u003e Option\u003ctree_sitter::Language\u003e {\r\n        match self {\r\n            Language::Rust =\u003e Some(tree_sitter_rust::LANGUAGE.into()),\r\n            Language::Python =\u003e Some(tree_sitter_python::LANGUAGE.into()),\r\n            Language::JavaScript | Language::TypeScript =\u003e {\r\n                Some(tree_sitter_javascript::LANGUAGE.into())\r\n            }\r\n            Language::Go =\u003e Some(tree_sitter_go::LANGUAGE.into()),\r\n            Language::C =\u003e Some(tree_sitter_c::LANGUAGE.into()),\r\n            Language::Cpp =\u003e Some(tree_sitter_cpp::LANGUAGE.into()),\r\n            Language::Java =\u003e Some(tree_sitter_java::LANGUAGE.into()),\r\n            Language::Unknown =\u003e None,\r\n        }\r\n    }\r\n}\r\n\r\n/// A code file to be analyzed\r\n#[derive(Debug, Clone, Serialize, Deserialize)]\r\npub struct SourceFile {\r\n    /// Relative path within the repository\r\n    pub path: String,\r\n    /// Raw source code content\r\n    pub content: String,\r\n    /// Detected programming language\r\n    pub language: Language,\r\n    /// File size in bytes\r\n    pub size: usize,\r\n}\r\n\r\n/// A fingerprint generated from source code\r\n#[derive(Debug, Clone, Serialize, Deserialize)]\r\npub struct CodeFingerprint {\r\n    /// Source file path\r\n    pub file_path: String,\r\n    /// Winnowing fingerprints (k-gram hashes)\r\n    pub winnowing_hashes: Vec\u003cu32\u003e,\r\n    /// Winnowing fingerprints with line numbers for chunk matching\r\n    pub fingerprint_lines: Vec\u003c(u32, usize)\u003e,\r\n    /// ALL k-gram hashes with line numbers (dense, for accurate chunk matching)\r\n    pub all_kgraph_lines: Vec\u003c(u32, usize)\u003e,\r\n    /// AST subtree structural hashes\r\n    pub ast_hashes: Vec\u003cu64\u003e,\r\n    /// Token frequency vector for cosine similarity\r\n    pub token_freq: Vec\u003cf64\u003e,\r\n    /// CFG (Control Flow Graph) structural hashes\r\n    pub cfg_hashes: Vec\u003cu64\u003e,\r\n    /// Order-independent bag-of-statements AST hashes\r\n    pub bag_ast_hashes: Vec\u003cu64\u003e,\r\n    /// Call graph edge hashes (caller→callee relationships)\r\n    pub call_graph_hashes: Vec\u003cu64\u003e,\r\n    /// Def-use graph hashes (variable definition → use edges, name-abstracted)\r\n    pub def_use_hashes: Vec\u003cu64\u003e,\r\n    /// Statement trigram hashes (three consecutive statement types, order-aware)\r\n    pub stmt_hashes: Vec\u003cu64\u003e,\r\n    /// Token count (for normalization)\r\n    pub token_count: usize,\r\n    /// Language of the file\r\n    pub language: Language,\r\n}\r\n\r\n/// A code snippet extracted from a source file (e.g., a function).\r\n#[derive(Debug, Clone, Serialize, Deserialize)]\r\npub struct FunctionSnippet {\r\n    /// Function name\r\n    pub name: String,\r\n    /// Source code of the function\r\n    pub content: String,\r\n    /// Start line in the source file (1-based)\r\n    pub start_line: usize,\r\n    /// End line in the source file (1-based)\r\n    pub end_line: usize,\r\n    /// Language of the function\r\n    pub language: Language,\r\n}\r\n\r\n/// Result of comparing two projects (directories)\r\n#[derive(Debug, Clone, Serialize, Deserialize)]\r\npub struct ProjectResult {\r\n    /// Overall project similarity score [0.0, 1.0]\r\n    pub project_score: f64,\r\n    /// Per-file best matches\r\n    pub file_matches: Vec\u003cProjectFileMatch\u003e,\r\n}\r\n\r\n/// Best match for a single file in project A against project B\r\n#[derive(Debug, Clone, Serialize, Deserialize)]\r\npub struct ProjectFileMatch {\r\n    /// File path in project A\r\n    pub file_a: String,\r\n    /// Best matching file in project B\r\n    pub file_b: String,\r\n    /// Similarity score for this pair\r\n    pub similarity_score: f64,\r\n    /// Winnowing score\r\n    pub winnowing_score: f64,\r\n    /// AST score\r\n    pub ast_score: f64,\r\n}\r\n\r\n/// Result of comparing two functions\r\n#[derive(Debug, Clone, Serialize, Deserialize)]\r\npub struct FunctionMatch {\r\n    /// Function name in file A\r\n    pub func_a: String,\r\n    /// File path of A\r\n    pub file_a: String,\r\n    /// Line range in file A\r\n    pub lines_a: (usize, usize),\r\n    /// Function name in file B\r\n    pub func_b: String,\r\n    /// File path of B\r\n    pub file_b: String,\r\n    /// Line range in file B\r\n    pub lines_b: (usize, usize),\r\n    /// Similarity score [0.0, 1.0]\r\n    pub similarity_score: f64,\r\n    /// Winnowing-based similarity\r\n    pub winnowing_score: f64,\r\n    /// AST-based similarity\r\n    pub ast_score: f64,\r\n}\r\n\r\n/// A matched chunk of code between two files\r\n#[derive(Debug, Clone, Serialize, Deserialize)]\r\npub struct ChunkMatch {\r\n    /// Start line in file A\r\n    pub line_a: usize,\r\n    /// End line in file A\r\n    pub line_end_a: usize,\r\n    /// Start line in file B\r\n    pub line_b: usize,\r\n    /// End line in file B\r\n    pub line_end_b: usize,\r\n    /// Similarity score of this chunk\r\n    pub score: f64,\r\n}\r\n\r\n/// Result of comparing two files\r\n#[derive(Debug, Clone, Serialize, Deserialize)]\r\npub struct SimilarityResult {\r\n    /// First file path\r\n    pub file_a: String,\r\n    /// Second file path\r\n    pub file_b: String,\r\n    /// Overall similarity score [0.0, 1.0]\r\n    pub similarity_score: f64,\r\n    /// Winnowing-based similarity\r\n    pub winnowing_score: f64,\r\n    /// AST-based similarity\r\n    pub ast_score: f64,\r\n    /// Matched code chunks\r\n    pub matched_chunks: Vec\u003cChunkMatch\u003e,\r\n}\r\n\r\n/// Configuration for the plagiarism analyzer\r\n#[derive(Debug, Clone)]\r\npub struct AnalyzerConfig {\r\n    /// k-gram size for winnowing (default: 5)\r\n    pub k_gram_size: usize,\r\n    /// Sliding window size for winnowing (default: 4)\r\n    pub window_size: usize,\r\n    /// Minimum similarity threshold for reporting [0.0, 1.0]\r\n    pub threshold: f64,\r\n    /// Minimum file size in bytes to analyze\r\n    pub min_file_size: usize,\r\n    /// Maximum file size in bytes to analyze\r\n    pub max_file_size: usize,\r\n}\r\n\r\nimpl Default for AnalyzerConfig {\r\n    fn default() -\u003e Self {\r\n        Self {\r\n            k_gram_size: 5,\r\n            window_size: 4,\r\n            threshold: 0.5,\r\n            min_file_size: 100,\r\n            max_file_size: 1_000_000, // 1MB\r\n        }\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n\r\n    #[test]\r\n    fn test_language_from_extension_rust() {\r\n        assert_eq!(Language::from_extension(\"rs\"), Language::Rust);\r\n    }\r\n\r\n    #[test]\r\n    fn test_language_from_extension_python() {\r\n        assert_eq!(Language::from_extension(\"py\"), Language::Python);\r\n    }\r\n\r\n    #[test]\r\n    fn test_language_from_extension_javascript() {\r\n        assert_eq!(Language::from_extension(\"js\"), Language::JavaScript);\r\n    }\r\n\r\n    #[test]\r\n    fn test_language_from_extension_typescript() {\r\n        assert_eq!(Language::from_extension(\"ts\"), Language::TypeScript);\r\n    }\r\n\r\n    #[test]\r\n    fn test_language_from_extension_go() {\r\n        assert_eq!(Language::from_extension(\"go\"), Language::Go);\r\n    }\r\n\r\n    #[test]\r\n    fn test_language_from_extension_c() {\r\n        assert_eq!(Language::from_extension(\"c\"), Language::C);\r\n    }\r\n\r\n    #[test]\r\n    fn test_language_from_extension_cpp() {\r\n        assert_eq!(Language::from_extension(\"cpp\"), Language::Cpp);\r\n        assert_eq!(Language::from_extension(\"cc\"), Language::Cpp);\r\n        assert_eq!(Language::from_extension(\"cxx\"), Language::Cpp);\r\n    }\r\n\r\n    #[test]\r\n    fn test_language_from_extension_java() {\r\n        assert_eq!(Language::from_extension(\"java\"), Language::Java);\r\n    }\r\n\r\n    #[test]\r\n    fn test_language_from_extension_unknown() {\r\n        assert_eq!(Language::from_extension(\"txt\"), Language::Unknown);\r\n        assert_eq!(Language::from_extension(\"\"), Language::Unknown);\r\n    }\r\n\r\n    #[test]\r\n    fn test_tree_sitter_language_rust() {\r\n        assert!(Language::Rust.tree_sitter_language().is_some());\r\n    }\r\n\r\n    #[test]\r\n    fn test_tree_sitter_language_unknown() {\r\n        assert!(Language::Unknown.tree_sitter_language().is_none());\r\n    }\r\n\r\n    #[test]\r\n    fn test_default_config_values() {\r\n        let config = AnalyzerConfig::default();\r\n        assert_eq!(config.k_gram_size, 5);\r\n        assert_eq!(config.window_size, 4);\r\n        assert!((config.threshold - 0.5).abs() \u003c 1e-10);\r\n        assert_eq!(config.min_file_size, 100);\r\n        assert_eq!(config.max_file_size, 1_000_000);\r\n    }\r\n\r\n    #[test]\r\n    fn test_source_file_creation() {\r\n        let sf = SourceFile {\r\n            path: \"test.rs\".into(),\r\n .\r\n    pub fn get(\u0026self, content: \u0026str) -\u003e Option\u003cCodeFingerprint\u003e {\r\n        let hash = Self::content_hash(content);\r\n        let path = self.cache_dir.join(format!(\"{}.json\", hash));\r\n        if path.exists() {\r\n            if let Ok(data) = std::fs::read_to_string(\u0026path) {\r\n                if let Ok(fp) = serde_json::from_str::\u003cCodeFingerprint\u003e(\u0026data) {\r\n                    return Some(fp);\r\n                }\r\n            }\r\n        }\r\n        None\r\n    }\r\n\r\n    /// Store a fingerprint in the cache.\r\n    pub fn set(\u0026self, content: \u0026str, fp: \u0026CodeFingerprint) {\r\n        let hash = Self::content_hash(content);\r\n        let path = self.cache_dir.join(format!(\"{}.json\", hash));\r\n        if let Ok(json) = serde_json::to_string(fp) {\r\n            let _ = std::fs::write(\u0026path, json);\r\n        }\r\n    }\r\n\r\n    /// Get cache statistics.\r\n    pub fn stats(\u0026self) -\u003e (usize, usize) {\r\n        (0, 0) // placeholder\r\n    }\r\n}\r\n\r\n/// The core similarity analysis engine\r\npub struct SimilarityEngine {\r\n    config: AnalyzerConfig,\r\n    fingerprints: HashMap\u003cString, CodeFingerprint\u003e,\r\n    cache: Option\u003cFingerprintCache\u003e,\r\n}\r\n\r\nimpl SimilarityEngine {\r\n    pub fn new(config: AnalyzerConfig) -\u003e Self {\r\n        Self {\r\n            config,\r\n            fingerprints: HashMap::new(),\r\n            cache: None,\r\n        }\r\n    }\r\n\r\n    /// Enable fingerprint caching.\r\n    pub fn with_cache(mut self, cache: FingerprintCache) -\u003e Self {\r\n        self.cache = Some(cache);\r\n        self\r\n    }\r\n\r\n    /// Compute or retrieve cached fingerprints for a single file.\r\n    fn fingerprint_file(\u0026self, file: \u0026SourceFile) -\u003e CodeFingerprint {\r\n        // Try cache first\r\n        if let Some(ref cache) = self.cache {\r\n            if let Some(cached) = cache.get(\u0026file.content) {\r\n                log::info!(\"Cache hit: {}\", file.path);\r\n                return cached;\r\n            }\r\n        }\r\n\r\n        // Compute fresh\r\n        let token_count = file.content.lines().count();\r\n        let token_freq = winnowing::compute_token_frequency(\u0026file.content, file.language);\r\n        let winnowing_hashes = winnowing::generate_fingerprints(\r\n            \u0026file.content, file.language,\r\n            self.config.k_gram_size, self.config.window_size,\r\n        );\r\n        let fingerprint_lines = winnowing::generate_fingerprints_with_lines(\r\n            \u0026file.content, file.language,\r\n            self.config.k_gram_size, self.config.window_size,\r\n        );\r\n        let all_kgraph_lines = winnowing::generate_all_kgraph_lines(\r\n            \u0026file.content, file.language, self.config.k_gram_size,\r\n        );\r\n        let ast_hashes = ast::generate_ast_hashes(\u0026file.content, file.language)\r\n            .unwrap_or_default();\r\n        let cfg_hashes = ast::generate_cfg_hashes(\u0026file.content, file.language);\r\n        let bag_ast_hashes = ast::generate_bag_ast_hashes(\u0026file.content, file.language);\r\n        let call_graph_hashes = ast::generate_call_graph_hashes(\u0026file.content, file.language);\r\n        let def_use_hashes = ast::generate_def_use_hashes(\u0026file.content, file.language);\r\n        let stmt_hashes = ast::generate_statement_hashes(\u0026file.content, file.language);\r\n\r\n        let fp = CodeFingerprint {\r\n            file_path: file.path.clone(),\r\n            winnowing_hashes,\r\n            fingerprint_lines,\r\n            all_kgraph_lines,\r\n            ast_hashes,\r\n            token_freq,\r\n            cfg_hashes,\r\n            bag_ast_hashes,\r\n            call_graph_hashes,\r\n            def_use_hashes,\r\n            stmt_hashes,\r\n            token_count,\r\n            language: file.language,\r\n        };\r\n\r\n        // Store in cache\r\n        if let Some(ref cache) = self.cache {\r\n            cache.set(\u0026file.content, \u0026fp);\r\n        }\r\n\r\n        fp\r\n    }\r\n\r\n    /// Index a set of source files: generate fingerprints for each\r\n    pub fn index_files(\u0026mut self, files: \u0026[SourceFile]) {\r\n        let skipped_before = files.len() - self.fingerprints.len();\r\n        let _ = skipped_before;\r\n\r\n        for file in files {\r\n            if file.size \u003c self.config.min_file_size\r\n                || file.size \u003e self.config.max_file_size\r\n            {\r\n                log::debug!(\"Skipping {} (size: {})\", file.path, file.size);\r\n                continue;\r\n            }\r\n            if file.language == Language::Unknown {\r\n                log::debug!(\"Skipping {} (unknown language)\", file.path);\r\n                continue;\r\n            }\r\n\r\n            log::info!(\"Indexing: {}\", file.path);\r\n            let fingerprint = self.fingerprint_file(file);\r\n            self.fingerprints.insert(file.path.clone(), fingerprint);\r\n        }\r\n\r\n        log::info!(\r\n            \"Indexed {} files ({} skipped)\",\r\n            self.fingerprints.len(),\r\n            files.len() - self.fingerprints.len()\r\n        );\r\n    }\r\n\r\n    /// Compare all indexed files against each other (parallel)\r\n    pub fn compare_all(\u0026self) -\u003e Vec\u003cSimilarityResult\u003e {\r\n        use rayon::prelude::*;\r\n\r\n        let paths: Vec\u003c\u0026String\u003e = self.fingerprints.keys().collect();\r\n        let n = paths.len();\r\n\r\n        // Build all index pairs (i, j) where i \u003c j\r\n        let pairs: Vec\u003c(usize, usize)\u003e = (0..n)\r\n            .flat_map(|i| ((i + 1)..n).map(move |j| (i, j)))\r\n            .collect();\r\n\r\n        let mut results: Vec\u003cSimilarityResult\u003e = pairs\r\n            .par_iter()\r\n            .filter_map(|\u0026(i, j)| {\r\n                let fp_a = \u0026self.fingerprints[paths[i]];\r\n                let fp_b = \u0026self.fingerprints[paths[j]];\r\n\r\n                if fp_a.language != fp_b.language {\r\n                    return None;\r\n                }\r\n\r\n                let winnowing_score = winnowing::jaccard_similarity(\r\n                    \u0026fp_a.winnowing_hashes,\r\n                    \u0026fp_b.winnowing_hashes,\r\n                );\r\n\r\n                let ast_score = ast::ast_jaccard_similarity(\r\n                    \u0026fp_a.ast_hashes,\r\n                    \u0026fp_b.ast_hashes,\r\n                );\r\n\r\n                let token_sim = winnowing::token_cosine_similarity(\r\n                    \u0026fp_a.token_freq, \u0026fp_b.token_freq,\r\n                );\r\n                let cfg_sim = ast::cfg_jaccard_similarity(\u0026fp_a.cfg_hashes, \u0026fp_b.cfg_hashes);\r\n                let bag_sim = ast::bag_ast_jaccard_similarity(\u0026fp_a.bag_ast_hashes, \u0026fp_b.bag_ast_hashes);\r\n                let cg_sim = ast::call_graph_jaccard_similarity(\u0026fp_a.call_graph_hashes, \u0026fp_b.call_graph_hashes);\r\n                let du_sim = ast::def_use_jaccard_similarity(\u0026fp_a.def_use_hashes, \u0026fp_b.def_use_hashes);\r\n                let st_sim = ast::cfg_jaccard_similarity(\u0026fp_a.stmt_hashes, \u0026fp_b.stmt_hashes);\r\n\r\n                let similarity_score = if fp_a.ast_hashes.is_empty() {\r\n                    0.40 * winnowing_score + 0.20 * bag_sim\r\n                        + 0.05 * token_sim + 0.10 * cfg_sim + 0.10 * cg_sim\r\n                        + 0.05 * du_sim + 0.10 * st_sim\r\n                } else {\r\n                    0.35 * winnowing_score + 0.20 * ast_score\r\n                        + 0.10 * bag_sim + 0.05 * token_sim + 0.10 * cfg_sim\r\n                        + 0.05 * cg_sim + 0.05 * du_sim + 0.10 * st_sim\r\n                };\r\n\r\n                if similarity_score \u003e= self.config.threshold {\r\n                    let matched_chunks = find_matching_chunks(fp_a, fp_b);\r\n                    Some(SimilarityResult {\r\n                        file_a: fp_a.file_path.clone(),\r\n                        file_b: fp_b.file_path.clone(),\r\n                        similarity_score,\r\n                        winnowing_score,\r\n                        ast_score,\r\n                        matched_chunks,\r\n                    })\r\n                } else {\r\n                    None\r\n                }\r\n            })\r\n            .collect();\r\n\r\n        results.sort_by(|a, b| {\r\n            b.similarity_score\r\n                .partial_cmp(\u0026a.similarity_score)\r\n                .unwrap_or(std::cmp::Ordering::Equal)\r\n        });\r\n\r\n        log::info!(\"Found {} similar file pairs\", results.len());\r\n        results\r\n    }\r\n\r\n    /// Compare a single target file against all indexed files (parallel)\r\n    pub fn compare_against(\u0026self, target: \u0026SourceFile) -\u003e Vec\u003cSimilarityResult\u003e {\r\n        use rayon::prelude::*;\r\n\r\n        if target.language == crate::core::types::Language::Unknown {\r\n            return Vec::new();\r\n        }\r\n\r\n        let target_fp = CodeFingerprint {\r\n            file_path: target.path.clone(),\r\n            winnowing_hashes: winnowing::generate_fingerprints(\r\n                \u0026target.content,\r\n                target.language,\r\n                self.config.k_gram_size,\r\n                self.config.window_size,\r\n            ),\r\n            fingerprint_lines: winnowing::generate_fingerprints_with_lines(\r\n                \u0026target.content,\r\n                target.language,\r\n                self.config.k_gram_size,\r\n                self.config.window_size,\r\n            ),\r\n            all_kgraph_lines: winnowing::generate_all_kgraph_lines(\r\n                \u0026target.content,\r\n                target.language,\r\n                self.config.k_gram_size,\r\n            ),\r\n            ast_hashes: ast::generate_ast_hashes(\u0026target.content, target.language)\r\n                .unwrap_or_default(),\r\n            token_freq: winnowing::compute_token_frequency(\u0026target.content, target.language),\r\n            cfg_hashes: ast::generate_cfg_hashes(\u0026target.content, target.language),\r\n            bag_ast_hashes: ast::generate_bag_ast_hashes(\u0026target.content, target.language),\r\n            call_graph_hashes: ast::generate_call_graph_hashes(\u0026target.content, target.language),\r\n            def_use_hashes: ast::generate_def_use_hashes(\u0026target.content, target.language),\r\n            stmt_hashes: ast::generate_statement_hashes(\u0026target.content, target.language),\r\n            token_count: target.content.lines().count(),\r\n            language: target.language,\r\n        };\r\n\r\n        let mut results: Vec\u003cSimilarityResult\u003e = self\r\n            .fingerprints\r\n            .par_iter()\r\n            .filter_map(|(path, fp)| {\r\n                if fp.language != target_fp.language {\r\n                    return None;\r\n                }\r\n\r\n                let winnowing_score = winnowing::jaccard_similarity(\r\n                    \u0026target_fp.winnowing_hashes,\r\n                    \u0026fp.winnowing_hashes,\r\n                );\r\n\r\n                let ast_score = ast::ast_jaccard_similarity(\r\n                    \u0026target_fp.ast_hashes,\r\n                    \u0026fp.ast_hashes,\r\n                );\r\n\r\n                let token_sim = winnowing::token_cosine_similarity(\r\n                    \u0026target_fp.token_freq, \u0026fp.token_freq,\r\n                );\r\n                let cfg_sim = ast::cfg_jaccard_similarity(\u0026target_fp.cfg_hashes, \u0026fp.cfg_hashes);\r\n                let bag_sim = ast::bag_ast_jaccard_similarity(\u0026target_fp.bag_ast_hashes, \u0026fp.bag_ast_hashes);\r\n                let cg_sim = ast::call_graph_jaccard_similarity(\u0026target_fp.call_graph_hashes, \u0026fp.call_graph_hashes);\r\n                let du_sim = ast::def_use_jaccard_similarity(\u0026target_fp.def_use_hashes, \u0026fp.def_use_hashes);\r\n                let st_sim = ast::cfg_jaccard_similarity(\u0026target_fp.stmt_hashes, \u0026fp.stmt_hashes);\r\n\r\n                let similarity_score = if target_fp.ast_hashes.is_empty() {\r\n                    0.40 * winnowing_score + 0.20 * bag_sim\r\n                        + 0.05 * token_sim + 0.10 * cfg_sim + 0.10 * cg_sim\r\n                        + 0.05 * du_sim + 0.10 * st_sim\r\n                } else {\r\n                    0.35 * winnowing_score + 0.20 * ast_score\r\n                        + 0.10 * bag_sim + 0.05 * token_sim + 0.10 * cfg_sim\r\n                        + 0.05 * cg_sim + 0.05 * du_sim + 0.10 * st_sim\r\n                };\r\n\r\n                if similarity_score \u003e= self.config.threshold {\r\n                    let matched_chunks = find_matching_chunks(\u0026target_fp, fp);\r\n                    Some(SimilarityResult {\r\n                        file_a: target.path.clone(),\r\n                        file_b: path.clone(),\r\n                        similarity_score,\r\n                        winnowing_score,\r\n                        ast_score,\r\n                        matched_chunks,\r\n                    })\r\n                } else {\r\n                    None\r\n                }\r\n            })\r\n            .collect();\r\n\r\n        results.sort_by(|a, b| {\r\n            b.similarity_score\r\n                .partial_cmp(\u0026a.similarity_score)\r\n                .unwrap_or(std::cmp::Ordering::Equal)\r\n        });\r\n\r\n        results\r\n    }\r\n\r\n    /// Get the number of indexed files\r\n    pub fn indexed_count(\u0026self) -\u003e usize {\r\n        self.fingerprints.len()\r\n    }\r\n\r\n    /// Compare two projects (directories) at the project level (parallel).\r\n    ///\r\n    /// For each file in project_a, finds the best matching file in project_b\r\n    /// (same language only). The project score is the average of these best matches.\r\n    pub fn compare_projects(\r\n        \u0026self,\r\n        project_a: \u0026[SourceFile],\r\n        project_b: \u0026[SourceFile],\r\n    ) -\u003e ProjectResult {\r\n        use rayon::prelude::*;\r\n        use crate::core::types::{ProjectFileMatch, ProjectResult};\r\n\r\n        let mut file_matches: Vec\u003cProjectFileMatch\u003e = project_a\r\n            .par_iter()\r\n            .filter_map(|file_a| {\r\n                if file_a.language == Language::Unknown {\r\n                    return None;\r\n                }\r\n\r\n                // Generate fingerprint for file A\r\n                let fp_a = CodeFingerprint {\r\n                    file_path: file_a.path.clone(),\r\n                    winnowing_hashes: winnowing::generate_fingerprints(\r\n                        \u0026file_a.content, file_a.language,\r\n                        self.config.k_gram_size, self.config.window_size,\r\n                    ),\r\n                    fingerprint_lines: Vec::new(),\r\n                    all_kgraph_lines: Vec::new(),\r\n                    ast_hashes: ast::generate_ast_hashes(\u0026file_a.content, file_a.language)\r\n                        .unwrap_or_default(),\r\n                    token_freq: winnowing::compute_token_frequency(\u0026file_a.content, file_a.language),\r\n                    cfg_hashes: ast::generate_cfg_hashes(\u0026file_a.content, file_a.language),\r\n                    bag_ast_hashes: ast::generate_bag_ast_hashes(\u0026file_a.content, file_a.language),\r\n                    call_graph_hashes: ast::generate_call_graph_hashes(\u0026file_a.content, file_a.language),\r\n                    def_use_hashes: ast::generate_def_use_hashes(\u0026file_a.content, file_a.language),\r\n                    stmt_hashes: ast::generate_statement_hashes(\u0026file_a.content, file_a.language),\r\n                    token_count: file_a.content.lines().count(),\r\n                    language: file_a.language,\r\n                };\r\n\r\n                // Find best match in project B\r\n                let mut best_score = 0.0;\r\n                let mut best_winnowing = 0.0;\r\n                let mut best_ast = 0.0;\r\n                let mut best_file = String::new();\r\n\r\n                for file_b in project_b {\r\n                    if file_b.language != file_a.language {\r\n                        continue;\r\n                    }\r\n\r\n                    let fp_b = CodeFingerprint {\r\n                        file_path: file_b.path.clone(),\r\n                        winnowing_hashes: winnowing::generate_fingerprints(\r\n                            \u0026file_b.content, file_b.language,\r\n                            self.config.k_gram_size, self.config.window_size,\r\n                        ),\r\n                        fingerprint_lines: Vec::new(),\r\n                        all_kgraph_lines: Vec::new(),\r\n                        ast_hashes: ast::generate_ast_hashes(\u0026file_b.content, file_b.language)\r\n                            .unwrap_or_default(),\r\n                        token_freq: winnowing::compute_token_frequency(\u0026file_b.content, file_b.language),\r\n                        cfg_hashes: ast::generate_cfg_hashes(\u0026file_b.content, file_b.language),\r\n                        bag_ast_hashes: ast::generate_bag_ast_hashes(\u0026file_b.content, file_b.language),\r\n                        call_graph_hashes: ast::generate_call_graph_hashes(\u0026file_b.content, file_b.language),\r\n                        def_use_hashes: ast::generate_def_use_hashes(\u0026file_b.content, file_b.language),\r\n                        stmt_hashes: ast::generate_statement_hashes(\u0026file_b.content, file_b.language),\r\n                        token_count: file_b.content.lines().count(),\r\n                        language: file_b.language,\r\n                    };\r\n\r\n                    let ws = winnowing::jaccard_similarity(\r\n                        \u0026fp_a.winnowing_hashes, \u0026fp_b.winnowing_hashes,\r\n                    );\r\n                    let as_ = ast::ast_jaccard_similarity(\u0026fp_a.ast_hashes, \u0026fp_b.ast_hashes);\r\n                    let ts = winnowing::token_cosine_similarity(\u0026fp_a.token_freq, \u0026fp_b.token_freq);\r\n                    let cs = ast::cfg_jaccard_similarity(\u0026fp_a.cfg_hashes, \u0026fp_b.cfg_hashes);\r\n                    let bs = ast::bag_ast_jaccard_similarity(\u0026fp_a.bag_ast_hashes, \u0026fp_b.bag_ast_hashes);\r\n                    let cgs = ast::call_graph_jaccard_similarity(\u0026fp_a.call_graph_hashes, \u0026fp_b.call_graph_hashes);\r\n                    let dus = ast::def_use_jaccard_similarity(\u0026fp_a.def_use_hashes, \u0026fp_b.def_use_hashes);\r\n                    let sts = ast::cfg_jaccard_similarity(\u0026fp_a.stmt_hashes, \u0026fp_b.stmt_hashes);\r\n                    let sim = if fp_a.ast_hashes.is_empty() {\r\n                        0.27 * ws + 0.17 * bs + 0.13 * ts + 0.13 * cs\r\n                            + 0.10 * cgs + 0.10 * dus + 0.10 * sts\r\n                    } else {\r\n                        0.22 * ws + 0.18 * as_ + 0.10 * bs + 0.10 * ts + 0.12 * cs\r\n                            + 0.10 * cgs + 0.10 * dus + 0.08 * sts\r\n                    };\r\n\r\n                    if sim \u003e best_score {\r\n                        best_score = sim;\r\n                        best_winnowing = ws;\r\n                        best_ast = as_;\r\n                        best_file = file_b.path.clone();\r\n                    }\r\n                }\r\n\r\n                if best_score \u003e= self.config.threshold {\r\n                    Some(ProjectFileMatch {\r\n                        file_a: file_a.path.clone(),\r\n                        file_b: best_file,\r\n                        similarity_score: best_score,\r\n                        win ns to include (e.g., \"*.rs\", \"*.py\")\r\n    include_patterns: Vec\u003cString\u003e,\r\n    /// File patterns to exclude\r\n    exclude_patterns: Vec\u003cString\u003e,\r\n}\r\n\r\nimpl GitHubFetcher {\r\n    /// Create a new GitHubFetcher\r\n    pub fn new(work_dir: impl Into\u003cPathBuf\u003e) -\u003e Self {\r\n        Self {\r\n            work_dir: work_dir.into(),\r\n            include_patterns: vec![\r\n                \"*.rs\".into(), \"*.py\".into(), \"*.js\".into(),\r\n                \"*.ts\".into(), \"*.go\".into(), \"*.c\".into(),\r\n                \"*.cpp\".into(), \"*.h\".into(), \"*.hpp\".into(),\r\n                \"*.java\".into(),\r\n            ],\r\n            exclude_patterns: vec![\r\n                \"*test*\".into(), \"*spec*\".into(), \"*.min.*\".into(),\r\n                \"vendor/*\".into(), \"node_modules/*\".into(),\r\n                \"target/*\".into(), \"__pycache__/*\".into(),\r\n            ],\r\n        }\r\n    }\r\n\r\n    /// Set custom include patterns\r\n    pub fn with_include_patterns(mut self, patterns: Vec\u003cString\u003e) -\u003e Self {\r\n        self.include_patterns = patterns;\r\n        self\r\n    }\r\n\r\n    /// Set custom exclude patterns\r\n    pub fn with_exclude_patterns(mut self, patterns: Vec\u003cString\u003e) -\u003e Self {\r\n        self.exclude_patterns = patterns;\r\n        self\r\n    }\r\n\r\n    /// Clone a GitHub repository and collect source files\r\n    pub fn fetch_repo(\u0026self, repo_url: \u0026str) -\u003e Result\u003cVec\u003cSourceFile\u003e\u003e {\r\n        let repo_name = extract_repo_name(repo_url);\r\n        let repo_dir = self.work_dir.join(\u0026repo_name);\r\n\r\n        // Clone if not already present\r\n        if !repo_dir.exists() {\r\n            self.clone_repo(repo_url, \u0026repo_dir)?;\r\n        }\r\n\r\n        self.collect_files(\u0026repo_dir)\r\n    }\r\n\r\n    /// Collect source files from a local directory\r\n    pub fn collect_local(\u0026self, dir: impl AsRef\u003cPath\u003e) -\u003e Result\u003cVec\u003cSourceFile\u003e\u003e {\r\n        self.collect_files(dir.as_ref())\r\n    }\r\n\r\n    /// Clone a repository using git\r\n    fn clone_repo(\u0026self, url: \u0026str, dest: \u0026Path) -\u003e Result\u003c()\u003e {\r\n        log::info!(\"Cloning {} into {}\", url, dest.display());\r\n\r\n        let output = Command::new(\"git\")\r\n            .args([\"clone\", \"--depth\", \"1\", url])\r\n            .arg(dest)\r\n            .output()\r\n            .context(\"Failed to execute git clone\")?;\r\n\r\n        if !output.status.success() {\r\n            let stderr = String::from_utf8_lossy(\u0026output.stderr);\r\n            anyhow::bail!(\"Git clone failed: {}\", stderr);\r\n        }\r\n\r\n        Ok(())\r\n    }\r\n\r\n    /// Recursively collect source files matching include/exclude patterns.\r\n    /// If `dir` is a file, returns a single-element vec with that file.\r\n    fn collect_files(\u0026self, path: \u0026Path) -\u003e Result\u003cVec\u003cSourceFile\u003e\u003e {\r\n        if path.is_file() {\r\n            // Use full path as-is so main.rs can re-read the file for chunk display\r\n            let display_path = path.to_string_lossy().to_string();\r\n            return Ok(self.read_file(path, \u0026display_path)\r\n                .into_iter()\r\n                .collect());\r\n        }\r\n\r\n        let include_globs: Vec\u003cPattern\u003e = self.include_patterns\r\n            .iter()\r\n            .filter_map(|p| Pattern::new(p).ok())\r\n            .collect();\r\n\r\n        let exclude_globs: Vec\u003cPattern\u003e = self.exclude_patterns\r\n            .iter()\r\n            .filter_map(|p| Pattern::new(p).ok())\r\n            .collect();\r\n\r\n        let mut files = Vec::new();\r\n        self.walk_dir(path, path, \u0026include_globs, \u0026exclude_globs, \u0026mut files)?;\r\n        Ok(files)\r\n    }\r\n\r\n    fn walk_dir(\r\n        \u0026self,\r\n        base: \u0026Path,\r\n        current: \u0026Path,\r\n        include_globs: \u0026[Pattern],\r\n        exclude_globs: \u0026[Pattern],\r\n        files: \u0026mut Vec\u003cSourceFile\u003e,\r\n    ) -\u003e Result\u003c()\u003e {\r\n        for entry in std::fs::read_dir(current)? {\r\n            let entry = entry?;\r\n            let path = entry.path();\r\n            let rel_path = path.strip_prefix(base)\r\n                .unwrap_or(\u0026path)\r\n                .to_string_lossy()\r\n                .to_string();\r\n\r\n            // Check exclude patterns\r\n            if exclude_globs.iter().any(|p| p.matches(\u0026rel_path)) {\r\n                continue;\r\n            }\r\n\r\n            if path.is_dir() {\r\n                // Skip hidden directories\r\n                if let Some(name) = path.file_name() {\r\n                    if name.to_string_lossy().starts_with('.') {\r\n                        continue;\r\n                    }\r\n                }\r\n                self.walk_dir(base, \u0026path, include_globs, exclude_globs, files)?;\r\n            } else if path.is_file() {\r\n                // Check include patterns\r\n                if !include_globs.iter().any(|p| p.matches(\u0026rel_path)) {\r\n                    continue;\r\n                }\r\n\r\n                if let Some(source_file) = self.read_file(\u0026path, \u0026rel_path) {\r\n                    files.push(source_file);\r\n                }\r\n            }\r\n        }\r\n        Ok(())\r\n    }\r\n\r\n    fn read_file(\u0026self, path: \u0026Path, rel_path: \u0026str) -\u003e Option\u003cSourceFile\u003e {\r\n        let mut content = std::fs::read_to_string(path).ok()?;\r\n        // Normalize CRLF → LF so tokenizer line tracking works correctly\r\n        content = content.replace(\"\\r\\n\", \"\\n\");\r\n        let ext = path.extension()\r\n            .and_then(|e| e.to_str())\r\n            .unwrap_or(\"\");\r\n        let language = Language::from_extension(ext);\r\n        let size = content.len();\r\n\r\n        Some(SourceFile {\r\n            path: rel_path.to_string(),\r\n            content,\r\n            language,\r\n            size,\r\n        })\r\n    }\r\n}\r\n\r\n/// Extract repository name from GitHub URL\r\nfn extract_repo_name(url: \u0026str) -\u003e String {\r\n    // Handle formats:\r\n    // https://github.com/user/repo.git\r\n    // https://github.com/user/repo\r\n    // git@github.com:user/repo.git\r\n    let url = url.trim_end_matches(\".git\");\r\n    let parts: Vec\u003c\u0026str\u003e = url.split('/').collect();\r\n    let last = parts.last().copied().unwrap_or(\"unknown\");\r\n\r\n    // For SSH URLs: git@github.com:user/repo\r\n    if last.contains(':') {\r\n        last.split(':').next_back().unwrap_or(\"unknown\").to_string()\r\n    } else {\r\n        last.to_string()\r\n    }\r\n}\r\n\r\n#[cfg(test)]\r\nmod tests {\r\n    use super::*;\r\n\r\n    #[test]\r\n    fn test_extract_repo_name_https() {\r\n        assert_eq!(\r\n            extract_repo_name(\"https://github.com/user/repo.git\"),\r\n            \"repo\"\r\n        );\r\n    }\r\n\r\n    #[test]\r\n    fn test_extract_repo_name_ssh() {\r\n        assert_eq!(\r\n            extract_repo_name(\"git@github.com:user/repo.git\"),\r\n            \"repo\"\r\n        );\r\n    }\r\n\r\n    #[test]\r\n    fn test_extract_repo_name_no_git() {\r\n        assert_eq!(\r\n            extract_repo_name(\"https://github.com/user/repo\"),\r\n            \"repo\"\r\n        );\r\n    }\r\n}\r\n","traces":[{"line":19,"address":[],"length":0,"stats":{"Line":936748722493063168}},{"line":21,"address":[],"length":0,"stats":{"Line":2810246167479189504}},{"line":22,"address":[],"length":0,"stats":{"Line":1873497444986126336}},{"line":28,"address":[],"length":0,"stats":{"Line":1873497444986126336}},{"line":37,"address":[],"length":0,"stats":{"Line":0}},{"line":38,"address":[],"length":0,"stats":{"Line":0}},{"line":39,"address":[],"length":0,"stats":{"Line":0}},{"line":
